function hlCard(h) {
  return `<div class="headline-card">
    <div class="topic-chip">${h.topic}</div>
    <div class="hl-title"><a href="./${h.id}.html">${h.title}</a></div>
    <div class="hl-authors">${h.authors}</div>
    <div class="hl-summary-cn">${h.cn}</div>
    <div class="hl-summary">${h.en}</div>
    <a class="hl-link" href="./${h.id}.html">Read full summary &rarr;</a>
  </div>`;
}

document.getElementById('hl-supporting').innerHTML = HEADLINES.slice(1).map(h => hlCard(h)).join('');

  sectionHTML += `<section class="section">

    <div class="cards-grid">`;
  for (const p of sec.papers) {
    const sz = p.s === 'lg' ? ' card-lg' : ' card-sm';
    sectionHTML += `<div class="card${sz}">
      <div class="card-title"><a href="./${p.id}.html">${p.t}</a></div>
      <div class="card-authors">${p.a}</div>
      <div class="card-finding">${p.f}</div>
    </div>`;
  }
  sectionHTML += `</div></section>`;
}
sectionsEl.innerHTML = sectionHTML;
